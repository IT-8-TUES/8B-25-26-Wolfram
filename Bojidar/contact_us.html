    <div class="page-indent">
    <h2 class="contact-title">
      Contact Us
    </h2>
    <p class="cotact-pre-form"> 
        You can ask us any question.
    </p>
    </div>
<form id="contact-form" class="contact-form">
    <div class="form-group">
        <label id="contact-name" class="form-label">
         Name
        </label>

        <input
          type="text"
          id="contact-name-form"
          class="form-input"
          placeholder="Your name"
        required>
      </div>

          <div class="form-group">
        <label id="contact-name" class="form-label">
          Email
        </label>

        <input
          type="email"
          id="contact-name-form"
          class="form-input"
          placeholder="you@example.com"
        >
      </div>

      <div class="form-group">
        <label id="contact-name" class="form-label">
          Message
        </label>

        <textarea
          id="contact-msg"
          class="form-textarea"
          placeholder="Your message..."
        ></textarea>


        <button type="submit" class="form-button">
        Send Message
      </button>

      <p id="contact-success" class="success-message">
        Message sent successfully!
      </p>


      </div>
    </form>

    <script src="func.js"></script>
